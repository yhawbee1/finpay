<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finpay Landing Page</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="nav-group">
        <!-- Logo -->
        <span>
          <img src="/assets/logo.svg" alt="Finpay Logo" />
          <p>Finpay</p></span
        >
        <!-- Nav Links -->
        <nav class="nav-links">
          <a href="">Products</a>
          <a href="">Customers</a>
          <a href="">Pricing</a>
          <a href="">Learn</a>
        </nav>
      </div>
      <!-- Call To Action -->
      <div #call-to-action>
        <a href class="login">Login</a>
        <a href="" class="sign-up">Sign Up</a>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section">
      <!-- Text -->
      <div class="hero-text">
        <h1>
          <span>Get paid early</span> <br />save automatically all your pay.
        </h1>
        <p>
          Support small business with simple invoicing powerful integrations,
          and cash flow management tools.
        </p>
        <form action="">
          <input type="email" placeholder="Enter your email" />
          <button>
            Get Started
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
            >
              <path
                fill="none"
                stroke="currentColor"
                d="M16 5c0 .742.733 1.85 1.475 2.78c.954 1.2 2.094 2.247 3.401 3.046C21.856 11.425 23.044 12 24 12m0 0c-.956 0-2.145.575-3.124 1.174c-1.307.8-2.447 1.847-3.401 3.045C16.733 17.15 16 18.26 16 19m8-7H0"
                stroke-width="1"
              />
            </svg>
          </button>
        </form>

        <div class="logos">
          <img src="/assets/coinbase.svg" alt="" />
          <img src="/assets/coinbase.svg" alt="" />
          <img src="/assets/coinbase.svg" alt="" />
        </div>
      </div>

      <!-- Image -->
      <div class="hero-image">
        <img
          src="/assets/payment.png"
          style="width: 400px; max-height: 400px"
          alt=""
        />
      </div>
    </section>
  </body>
</html>
